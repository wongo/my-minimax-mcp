    <!-- Hair (short dark hair) -->
    <path d="M10 30 Q10 5 42 5 Q74 5 74 30 Q74 20 65 15 Q55 8 42 8 Q29 8 19 15 Q10 20 10 30Z" fill="#2C1810" stroke="#333333" stroke-width="2"/>
    <path d="M12 28 Q12 10 42 10 Q72 10 72 28 Q65 22 55 18 Q42 14 29 18 Q18 22 12 28Z" fill="#3D2317"/>
    <!-- Hair highlight -->
    <path d="M25 12 Q35 8 45 12" stroke="#5D4037" stroke-width="2" fill="none"/>
    
    <!-- Face features -->
    <!-- Large anime eyes -->
    <ellipse cx="30" cy="38" rx="8" ry="9" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
    <ellipse cx="54" cy="38" rx="8" ry="9" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
    <!-- Pupils -->
    <ellipse cx="31" cy="39" rx="5" ry="6" fill="#3D2317"/>
    <ellipse cx="55" cy="39" rx="5" ry="6" fill="#3D2317"/>
