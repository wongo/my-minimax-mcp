      <path d="M0 0 L5 45 L35 45 L40 0 Z" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
      <ellipse cx="20" cy="2" rx="20" ry="5" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
      <!-- Straw -->
      <rect x="18" y="-35" width="4" height="40" fill="#FF6B6B"/>
      <rect x="17" y="-40" width="6" height="8" fill="#FF6B6B"/>
