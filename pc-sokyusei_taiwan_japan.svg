    <path d="M46 28 Q54 26 62 28" stroke="#2C1810" stroke-width="2" fill="none"/>
    <!-- Nose -->
    <path d="M42 45 L40 50 L44 50" stroke="#D4A59A" stroke-width="1.5" fill="none"/>
    <!-- Mouth (smile) -->
    <path d="M35 58 Q42 64 49 58" stroke="#CC7777" stroke-width="2" fill="none"/>
