      <rect x="0" y="0" width="22" height="28" rx="2" fill="#2E5A3C" stroke="#1A3D28" stroke-width="2"/>
      <rect x="4" y="5" width="14" height="10" fill="#D4AF37"/>
      <text x="11" y="13" font-family="Arial, sans-serif" font-size="6" fill="#1A3D28" text-anchor="middle">護照</text>
    </g>
    
    <!-- Pants -->
