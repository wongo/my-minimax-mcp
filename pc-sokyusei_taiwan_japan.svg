      <ellipse cx="0" cy="-8" rx="4" ry="6" fill="#FFB7C5" stroke="#FF69B4" stroke-width="1"/>
      <ellipse cx="7" cy="-3" rx="4" ry="6" fill="#FFB7C5" stroke="#FF69B4" stroke-width="1" transform="rotate(72)"/>
      <ellipse cx="5" cy="6" rx="4" ry="6" fill="#FFB7C5" stroke="#FF69B4" stroke-width="1" transform="rotate(144)"/>
      <ellipse cx="-5" cy="6" rx="4" ry="6" fill="#FFB7C5" stroke="#FF69B4" stroke-width="1" transform="rotate(216)"/>
      <ellipse cx="-7" cy="-3" rx="4" ry="6" fill="#FFB7C5" stroke="#FF69B4" stroke-width="1" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="4" fill="#FFEB3B"/>
      <!-- Petal details -->
      <circle cx="0" cy="-5" r="1" fill="#FF69B4" opacity="0.5"/>
    </g>
    
    <!-- Second small sakura -->
    <g transform="translate(50, 20) scale(0.6)">
      <ellipse cx="0" cy="-6" rx="3" ry="5" fill="#FFC0CB" stroke="#FF69B4" stroke-width="1"/>
      <ellipse cx="5" cy="-2" rx="3" ry="5" fill="#FFC0CB" stroke="#FF69B4" stroke-width="1" transform="rotate(72)"/>
      <ellipse cx="4" cy="5" rx="3" ry="5" fill="#FFC0CB" stroke="#FF69B4" stroke-width="1" transform="rotate(144)"/>
      <ellipse cx="-4" cy="5" rx="3" ry="5" fill="#FFC0CB" stroke="#FF69B4" stroke-width="1" transform="rotate(216)"/>
      <ellipse cx="-5" cy="-2" rx="3" ry="5" fill="#FFC0CB" stroke="#FF69B4" stroke-width="1" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="3" fill="#FFEB3B"/>
    </g>
    
    <!-- Face features -->
    <!-- Large anime eyes (larger for female) -->
    <ellipse cx="26" cy="38" rx="9" ry="10" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
    <ellipse cx="50" cy="38" rx="9" ry="10" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
    <!-- Pupils -->
    <ellipse cx="27" cy="39" rx="6" ry="7" fill="#1A0F0A"/>
    <ellipse cx="51" cy="39" rx="6" ry="7" fill="#1A0F0A"/>
    <!-- Eye highlights -->
    <circle cx="29" cy="36" r="2.5" fill="#FFFFFF"/>
    <circle cx="53" cy="36" r="2.5" fill="#FFFFFF"/>
    <circle cx="25" cy="41" r="1" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="49" cy="41" r="1" fill="#FFFFFF" opacity="0.6"/>
    <!-- Eyelashes -->
    <path d="M18 32 L16 29" stroke="#1A0F0A" stroke-width="1.5"/>
    <path d="M34 32 L36 29" stroke="#1A0F0A" stroke-width="1.5"/>
    <path d="M42 32 L40 29" stroke="#1A0F0A" stroke-width="1.5"/>
    <path d="M58 32 L60 29" stroke="#1A0F0A" stroke-width="1.5"/>
    <!-- Eyebrows -->
    <path d="M18 28 Q26 25 34 28" stroke="#1A0F0A" stroke-width="2" fill="none"/>
    <path d="M42 28 Q50 25 58 28" stroke="#1A0F0A" stroke-width="2" fill="none"/>
    <!-- Nose -->
    <path d="M38 45 L36 51 L40 51" stroke="#D4A59A" stroke-width="1.5" fill="none"/>
    <!-- Mouth (cute smile) -->
    <path d="M32 58 Q38 63 44 58" stroke="#CC7777" stroke-width="2" fill="none"/>
    <path d="M34 58 Q38 56 42 58" fill="#FF9999"/>
    <!-- Blush -->
    <ellipse cx="18" cy="50" rx="6" ry="3" fill="#FFB6C1" opacity="0.5"/>
    <ellipse cx="58" cy="50" rx="6" ry="3" fill="#FFB6C1" opacity="0.5"/>
    
    <!-- Ears -->
    <ellipse cx="8" cy="38" rx="5" ry="8" fill="#F5D0C5" stroke="#333333" stroke-width="1.5"/>
    <ellipse cx="68" cy="38" rx="5" ry="8" fill="#F5D0C5" stroke="#333333" stroke-width="1.5"/>
    
    <!-- Hair ribbon/bow accent -->
    <path d="M62 25 Q70 20 65 28 Q70 35 62 30" fill="#FF69B4" stroke="#FF1493" stroke-width="1"/>
  </g>
  
  <!-- Connection/Heart symbol between them -->
  <g transform="translate(185, 145)">
    <path d="M0 8 C0 3 5 -2 10 3 C15 -2 20 3 20 8 C20 15 10 22 10 22 C10 22 0 15 0 8Z" fill="#FF6B8A" stroke="#CC3355" stroke-width="1.5" transform="scale(0.8)"/>
  </g>
  
  <!-- Bottom text -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">♡ 友情ollars ♡</text>
  <text x="200" y="293" font-family="Arial, sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">PC級生style</text>
  
  <!-- Retro scanline effect (subtle) -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="400" y2="0" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="2" x2="400" y2="2" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="4" x2="400" y2="4" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="6" x2="400" y2="6" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="8" x2="400" y2="8" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="10" x2="400" y2="10" stroke="#000" stroke-width="1"/>
  </g>
