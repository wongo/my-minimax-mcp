    <ellipse cx="22" cy="50" rx="5" ry="3" fill="#FFB6C1" opacity="0.4"/>
    <ellipse cx="62" cy="50" rx="5" ry="3" fill="#FFB6C1" opacity="0.4"/>
    
    <!-- Ears -->
    <ellipse cx="10" cy="38" rx="5" ry="8" fill="#F5D0C5" stroke="#333333" stroke-width="1.5"/>
    <ellipse cx="74" cy="38" rx="5" ry="8" fill="#F5D0C5" stroke="#333333" stroke-width="1.5"/>
  </g>
  
  <!-- FEMALE CHARACTER (Japan - Right Side) -->
  <g transform="translate(215, 85)">
    <!-- Neck -->
    <rect x="28" y="55" width="20" height="15" fill="#F5D0C5" stroke="#333333" stroke-width="1.5"/>
    
