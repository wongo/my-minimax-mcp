      <circle cx="22" cy="35" r="4" fill="#4A3728"/>
      <circle cx="28" cy="28" r="4" fill="#4A3728"/>
      <circle cx="17" cy="22" r="4" fill="#4A3728"/>
      <circle cx="25" cy="18" r="3" fill="#4A3728"/>
