<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#FFFFFF"/>
  
  <!-- Circular beige background block -->
  <circle cx="200" cy="160" r="130" fill="#F5E6D3"/>
  <circle cx="200" cy="160" r="128" fill="#FAF3EB" stroke="#D4C4B0" stroke-width="2"/>
  
  <!-- Decorative dots pattern -->
  <g fill="#E8DDD0" opacity="0.6">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="95" cy="95" r="2"/>
    <circle cx="320" cy="85" r="3"/>
    <circle cx="305" cy="70" r="2"/>
    <circle cx="330" cy="230" r="2"/>
    <circle cx="70" cy="240" r="2"/>
  </g>
  
  <!-- Taiwan Flag (top left) -->
  <g transform="translate(45, 35)">
    <rect x="0" y="0" width="35" height="24" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
    <rect x="0" y="0" width="12" height="12" fill="#0066CC"/>
    <circle cx="6" cy="6" r="4" fill="#DE0023"/>
    <!-- Flag pole -->
    <rect x="-3" y="-3" width="3" height="30" fill="#8B7355"/>
  </g>
  
  <!-- Japan Flag (top right) -->
  <g transform="translate(320, 35)">
    <rect x="0" y="0" width="35" height="24" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
    <circle cx="17.5" cy="12" r="7" fill="#BC002D"/>
    <!-- Flag pole -->
    <rect x="-3" y="-3" width="3" height="30" fill="#8B7355"/>
  </g>
  
  <!-- Small decorative hearts -->
  <path d="M55 180 C55 175 60 172 63 175 C66 172 71 175 71 180 C71 185 63 190 63 190 C63 190 55 185 55 180Z" fill="#FFB6C1" opacity="0.6"/>
  <path d="M340 160 C340 156 344 154 346 156 C348 154 352 156 352 160 C352 164 346 168 346 168 C346 168 340 164 340 160Z" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- TAIWAN text (retro style) -->
  <text x="200" y="55" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333333" text-anchor="middle" letter-spacing="2">PC級生 TAIWAN×JAPAN</text>
  
  <!-- MALE CHARACTER (Taiwan - Left Side) -->
  <g transform="translate(105, 85)">
    <!-- Green backpack strap -->
    <path d="M25 45 Q15 50 10 90 L15 92 Q20 55 28 48" fill="#4A7C59" stroke="#2D4A35" stroke-width="2"/>
    
    <!-- Neck -->
    <rect x="28" y="55" width="20" height="15" fill="#F5D0C5" stroke="#333333" stroke-width="1.5"/>
    
    <!-- Body/Shirt (white) -->
    <path d="M10 70 L10 160 L75 160 L75 70 Q60 60 42 60 Q25 60 10 70Z" fill="#FFFFFF" stroke="#333333" stroke-width="2.5"/>
    
    <!-- T-shirt text TAIWAN -->
    <text x="42" y="105" font-family="Arial Black, sans-serif" font-size="12" font-weight="bold" fill="#0066CC" text-anchor="middle">TAIWAN</text>
    <text x="42" y="118" font-family="Arial, sans-serif" font-size="8" fill="#666666" text-anchor="middle">台湾</text>
    
    <!-- Arms -->
